<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Profile</title>

<link rel="stylesheet" href="profile.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="profile-container">

    <div class="profile-card">

        <img
        src="https://i.pinimg.com/1200x/5f/1f/98/5f1f989ac56ad3e4478df110d39266ff.jpg"
        class="profile-img">

        <h1 id="studentName">
            Student Name
        </h1>

        <p id="studentEmail">
            student@email.com
        </p>

        <button id="editBtn">
            Edit Profile
        </button>

    </div>

    <div class="stats-container">

        <div class="stat-card">

            <i class="fas fa-book-open"></i>

            <h2>12</h2>

            <p>Courses Enrolled</p>

        </div>

        <div class="stat-card">

            <i class="fas fa-certificate"></i>

            <h2>5</h2>

            <p>Certificates Earned</p>

        </div>

        <div class="stat-card">

            <i class="fas fa-clock"></i>

            <h2>120</h2>

            <p>Learning Hours</p>

        </div>

    </div>

    <div class="actions">

        <button id="myCoursesBtn">
            My Courses
        </button>

        <button id="logoutBtn">
            Logout
        </button>

    </div>

</div>

<script src="profile.js"></script>

</body>
</html>
