<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Courses</title>

<link rel="stylesheet" href="mycourse.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header>

    <h1>My Learning</h1>

    <button id="dashboardBtn">
        Dashboard
    </button>

</header>

<div class="courses-container">

    <div class="course-card">

        <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=600">

        <div class="content">

            <h2>Full Stack Web Development</h2>

            <p>
                Learn HTML, CSS, JavaScript,
                React, Node.js and MongoDB.
            </p>

            <div class="progress-box">

                <span>Progress</span>

                <div class="progress-bar">
                    <div class="progress fill1"></div>
                </div>

                <span>75%</span>

            </div>

            <div class="buttons">

                <button class="continueBtn">
                    Continue Learning
                </button>

                <button class="certificateBtn">
                    Certificate
                </button>

            </div>

        </div>

    </div>

    <div class="course-card">

        <img src="https://images.unsplash.com/photo-1555949963-aa79dcee981c?w=600">

        <div class="content">

            <h2>Java Programming</h2>

            <p>
                Core Java, Advanced Java and Projects.
            </p>

            <div class="progress-box">

                <span>Progress</span>

                <div class="progress-bar">
                    <div class="progress fill2"></div>
                </div>

                <span>100%</span>

            </div>

            <div class="buttons">

                <button class="continueBtn">
                    Review Course
                </button>

                <button class="certificateBtn">
                    Download Certificate
                </button>

            </div>

        </div>

    </div>

</div>

<script src="mycourse.js"></script>

</body>
</html>
