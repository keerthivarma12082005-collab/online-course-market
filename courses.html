<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courses - EduMarket</title>

<link rel="stylesheet" href="courses.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header>

    <h1>Explore Courses</h1>

    <input
    type="text"
    id="searchInput"
    placeholder="Search Courses...">

</header>

<div class="course-container" id="courseContainer">

    <div class="course-card">

        <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=600">

        <h3>Web Development</h3>

        <p>
            Learn HTML, CSS, JavaScript,
            React and Node.js
        </p>

        <div class="price">
            ₹999
        </div>

        <button class="detailsBtn">
            View Details
        </button>

        <button class="cartBtn">
            Add To Cart
        </button>

    </div>

    <div class="course-card">

        <img src="https://images.unsplash.com/photo-1555949963-aa79dcee981c?w=600">

        <h3>Java Programming</h3>

        <p>
            Learn Core Java and Advanced Java.
        </p>

        <div class="price">
            ₹799
        </div>

        <button class="detailsBtn">
            View Details
        </button>

        <button class="cartBtn">
            Add To Cart
        </button>

    </div>

    <div class="course-card">

        <img src="https://images.unsplash.com/photo-1526379095098-d400fd0bf935?w=600">

        <h3>Data Science</h3>

        <p>
            Python, ML and Analytics Course.
        </p>

        <div class="price">
            ₹1499
        </div>

        <button class="detailsBtn">
            View Details
        </button>

        <button class="cartBtn">
            Add To Cart
        </button>

    </div>

</div>

<script src="./js/courses.js"></script>

</body>
</html>
